# SCOPE — set-completion recommender.
# The SCOPE scripts under scope/ read the dataset layout and multimodal features
# through this model config (paths come from configs/dataset/<ds>.yaml). SCOPE has
# no trained user parameters; the head dimension and fusion weights below are the
# defaults reported in the paper, overridable from the command line.
model: SCOPE

embedding_size: 256        # set-completion head dimension d
learning_rate: 0.003
train_batch_size: 8192
reg_weight: 1.0e-6

# Validation-selected closed-form/fusion parameters (grids searched on validation
# Recall@20, never on test; selection logic in scope/scope.py):
#   base ridge   lambda in {400, 800, 1500}          -> selected 800/800/1500 (baby/sports/clothing)
#   text weight  a      in {0.0, 0.3, 0.5, 0.7}      -> selected 0.5/0.5/0.7
#   fusion       gamma  in {0.3, 0.6, 1.0, 1.5, 2.0, 3.0, 5.0}  (fine grid in scope/gamma_sweep.py)
#                                                    -> selected 0.3/0.3/0.6
#   SCOPE-U gate weights: non-negative grid per view, selected on validation
#     (scope/ensemble_control.py); isotropy weight l_E = 1.0.
