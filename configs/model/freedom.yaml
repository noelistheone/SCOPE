model: FREEDOM

embedding_size: 64
feat_embed_dim: 64
n_layers: 2                 # user-item LightGCN layers
n_mm_layers: 1              # item-item mm-graph layers
knn_k: 10
mm_image_weight: 0.1        # weight of image side; text gets (1 - this)
dropout: 0.8                # edge dropout on user-item graph
reg_weight: 1.0e-4
learning_rate: 0.001
train_batch_size: 2048
