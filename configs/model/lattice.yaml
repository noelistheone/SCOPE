model: LATTICE

embedding_size: 64
feat_embed_dim: 64
n_layers: 1                 # item-item layers
n_ui_layers: 2              # user-item LightGCN layers
knn_k: 10
lambda_coeff: 0.9           # blend of frozen vs learned item-item graph
mm_image_weight: 0.1
reg_weight: 1.0e-4
learning_rate: 0.0005
train_batch_size: 2048
