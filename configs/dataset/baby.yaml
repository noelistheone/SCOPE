# Amazon-Baby (MMRec preprocessed).
dataset: baby
data_path: data/baby

inter_file_name: baby.inter
inter_separator: "\t"

# Column names in the .inter file.
user_id_field: userID
item_id_field: itemID
split_field: x_label        # 0=train, 1=valid, 2=test (MMRec convention)

# Preprocessed multimodal features.
vision_feature_file: image_feat.npy
text_feature_file: text_feat.npy

# Reference scale (filled at load time; here for documentation).
# n_users ~= 19445, n_items ~= 7050, n_interactions ~= 160792
